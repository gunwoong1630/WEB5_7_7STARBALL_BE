name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test # 테스트 제외하고 빌드

    - name: Copy files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        source: "build/libs/*.jar,docker-compose.yml,Dockerfile" # .jar 파일, docker-compose.yml, Dockerfile 복사
        target: "~/app"
        
    - name: Run Docker Compose on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        script: |
          cd ~/app
          # 전달받은 환경 변수들을 쉘에 export하여 docker-compose가 사용하도록 함
          export MYSQL_ROOT_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }}
          export MYSQL_DATABASE=${{ env.MYSQL_DATABASE }}
          export MYSQL_USER=${{ env.MYSQL_USER }}
          export MYSQL_PASSWORD=${{ env.MYSQL_PASSWORD }}
          export DB_URL=${{ env.DB_URL }}
          export DB_USERNAME=${{ env.DB_USERNAME }}
          export DB_PASSWORD=${{ env.DB_PASSWORD }}
          export OPENAI_KEY=${{ env.OPENAI_KEY }}
          export KAKAO_API_KEY=${{ env.KAKAO_API_KEY }}
          export KAKAO_CLIENT_SECRET=${{ env.KAKAO_CLIENT_SECRET }}
          export KAKAO_REDIRECT_URI=${{ env.KAKAO_REDIRECT_URI }}
          export DATAPORTAL_KEY=${{ env.DATAPORTAL_KEY }}
          export BADANURI_KEY=${{ env.BADANURI_KEY }}
          export JWT_SECRET=${{ env.JWT_SECRET }}
          export REDIS_HOST=${{ env.REDIS_HOST }}
          export REDIS_PORT=${{ env.REDIS_PORT }}
          export REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}
          
          # 기존 서비스 중지 및 제거 (데이터베이스 볼륨 보존을 위해 --volumes는 사용하지 않음, 필요시 추가)
          echo "Stopping and removing existing Docker Compose services..."
          docker-compose down --remove-orphans || true

          # --build 옵션으로 app 서비스의 이미지를 새로 빌드하고, -d로 백그라운드 실행
          echo "Starting new Docker Compose services..."
          docker-compose up -d --build
      env: # 이 env 블록은 스텝 레벨에 있습니다.
        MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
        MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        MYSQL_USER: ${{ secrets.DB_USERNAME }}
        MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_URL: ${{ secrets.DB_URL }}
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
        KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
        DATAPORTAL_KEY: ${{ secrets.DATAPORTAL_KEY }}
        BADANURI_KEY: ${{ secrets.BADANURI_KEY }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}