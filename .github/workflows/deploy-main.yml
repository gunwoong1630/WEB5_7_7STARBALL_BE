name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test # 테스트 제외하고 빌드

    - name: Copy files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        source: "build/libs/*.jar,docker-compose.yml,Dockerfile" # .jar 파일, docker-compose.yml, Dockerfile 복사
        target: "~/app"
        
    - name: Run Docker Compose on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        env: # GitHub Secrets를 EC2 환경 변수로 전달
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          # application-prod.yml에 있는 다른 환경 변수들도 여기에 추가해야 합니다.
          # 예시:
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          DATAPORTAL_KEY: ${{ secrets.DATAPORTAL_KEY }}
          BADANURI_KEY: ${{ secrets.BADANURI_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        script: |
          cd ~/app
          # 전달받은 환경 변수들을 쉘에 export하여 docker-compose가 사용하도록 함
          export MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          export MYSQL_DATABASE=${MYSQL_DATABASE}
          export MYSQL_USER=${MYSQL_USER}
          export MYSQL_PASSWORD=${MYSQL_PASSWORD}
          # 다른 환경 변수들도 export
          export REDIS_HOST=${REDIS_HOST}
          export REDIS_PORT=${REDIS_PORT}
          export REDIS_PASSWORD=${REDIS_PASSWORD}
          export OPENAI_KEY=${OPENAI_KEY}
          export KAKAO_API_KEY=${KAKAO_API_KEY}
          export KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
          export KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
          export DATAPORTAL_KEY=${DATAPORTAL_KEY}
          export BADANURI_KEY=${BADANURI_KEY}
          export JWT_SECRET=${JWT_SECRET}
          
          # --build 옵션으로 app 서비스의 이미지를 새로 빌드하고, -d로 백그라운드 실행
          docker-compose up -d --build