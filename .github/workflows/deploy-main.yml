name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test # н…ҢмҠӨнҠё м ңмҷён•ҳкі  л№Ңл“ң

    - name: Copy files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        source: "build/libs/*.jar,docker-compose.yml,Dockerfile" # .jar нҢҢмқј, docker-compose.yml, Dockerfile ліөмӮ¬
        target: "~/app"
        
    - name: Run Docker Compose on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
        script: |
          cd ~/app
          # м „лӢ¬л°ӣмқҖ нҷҳкІҪ ліҖмҲҳл“Өмқ„ мүҳм—җ exportн•ҳм—¬ docker-composeк°Җ мӮ¬мҡ©н•ҳлҸ„лЎқ н•Ё
          export MYSQL_ROOT_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }}
          export MYSQL_DATABASE=${{ env.MYSQL_DATABASE }}
          export MYSQL_USER=${{ env.MYSQL_USER }}
          export MYSQL_PASSWORD=${{ env.MYSQL_PASSWORD }}
          export REDIS_HOST=${{ env.REDIS_HOST }}
          export REDIS_PORT=${{ env.REDIS_PORT }}
          export REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}
          export OPENAI_KEY=${{ env.OPENAI_KEY }}
          export KAKAO_API_KEY=${{ env.KAKAO_API_KEY }}
          export KAKAO_CLIENT_SECRET=${{ env.KAKAO_CLIENT_SECRET }}
          export KAKAO_REDIRECT_URI=${{ env.KAKAO_REDIRECT_URI }}
          export DATAPORTAL_KEY=${{ env.DATAPORTAL_KEY }}
          export BADANURI_KEY=${{ env.BADANURI_KEY }}
          export JWT_SECRET=${{ env.JWT_SECRET }}
          
          # --build мҳөм…ҳмңјлЎң app м„ңл№„мҠӨмқҳ мқҙлҜём§ҖлҘј мғҲлЎң л№Ңл“ңн•ҳкі , -dлЎң л°ұк·ёлқјмҡҙл“ң мӢӨн–ү
          docker-compose up -d --build
      env: # мқҙ env лё”лЎқмқҖ мҠӨн…қ л ҲлІЁм—җ мһҲмҠөлӢҲлӢӨ.
        MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        MYSQL_USER: ${{ secrets.MYSQL_USER }}
        MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
        KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
        DATAPORTAL_KEY: ${{ secrets.DATAPORTAL_KEY }}
        BADANURI_KEY: ${{ secrets.BADANURI_KEY }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}