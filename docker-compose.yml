version: '3.8'

services:
  # MySQL 데이터베이스 서비스
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # GitHub Secret에서 주입
      MYSQL_DATABASE: ${MYSQL_DATABASE} # GitHub Secret에서 주입
      MYSQL_USER: ${DB_USERNAME} # GitHub Secret에서 주입
      MYSQL_PASSWORD: ${DB_PASSWORD} # GitHub Secret에서 주입
    volumes:
      - ./mysql-data:/var/lib/mysql # 데이터 영속성을 위해 호스트와 볼륨 매핑
    ports:
      - "3306:3306" # 외부 접근을 위해 포트 개방 (보안상 주의)
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # Spring Boot 애플리케이션 서비스
  app:
    container_name: sevenstar_app
    build: . # 현재 디렉터리의 Dockerfile을 사용하여 이미지 빌드
    depends_on:
      - db # db 서비스가 시작된 후에 app 서비스 시작
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Spring Boot 애플리케이션에 DB 연결 정보 환경 변수로 전달
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    ports:
      - "80:8080" # 호스트의 80번 포트를 컨테이너의 8080 포트로 매핑
